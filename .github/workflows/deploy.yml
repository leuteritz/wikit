name: Deploy to Raspberry Pi

# Heimnetz ohne öffentliche IP: der Self-Hosted Runner auf dem Pi pollt GitHub
# (ausgehend, kein eingehender Port nötig). Der Build läuft NATIV auf ARM64,
# was das better-sqlite3-Cross-Compile-Problem komplett umgeht.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Nie zwei Deploys gleichzeitig; ein neuer Push canceled einen laufenden.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) Schneller Gate-Job auf GitHub-Hosted Runner: bricht der Build, wird gar
  #    nicht erst deployt. (Kein Docker, nur npm — x86, schnell.)
  build-check:
    name: Build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # 2) Deploy auf dem Pi (Self-Hosted Runner, Labels: linux + ARM64).
  deploy:
    name: Build & deploy on Pi
    needs: build-check
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v4

      # Persistente .env (mit DATA_DIR=/opt/wikit/data) liegt EINMALIG außerhalb
      # des Checkouts auf dem Pi und wird vor compose hereinkopiert — der Checkout
      # selbst ist gitignore-bereinigt und enthält keine .env.
      - name: Provide environment file
        run: cp /opt/wikit/.env .env

      - name: Build & (re)start containers
        run: docker compose up -d --build --remove-orphans

      - name: Prune dangling images
        run: docker image prune -f

  # 3) Versions-Tag setzen. Laeuft NACH erfolgreichem Deploy auf einem GitHub-hosted
  #    Runner (sauberer Tag-Push via GITHUB_TOKEN, der Pi muss dafuer nichts tun).
  #    Single Source der Version = Root-package.json; getaggt wird als vMAJOR.MINOR
  #    (passend zum Header-Badge). Idempotent: existiert das Tag schon, wird es uebersprungen.
  version-tag:
    name: Tag release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: version
        run: |
          FULL=$(node -p "require('./package.json').version")
          TAG="v$(echo "$FULL" | cut -d. -f1-2)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version $FULL -> Tag $TAG"

      - name: Create and push tag (if new)
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG existiert bereits - uebersprungen."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
