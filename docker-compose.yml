# Wikit — 2-Container-Stack (nginx-Frontend + NestJS-Backend + SQLite-Volume).
#
# Lokal testen:   cp .env.example .env  &&  docker compose up -d --build
# Frontend:       http://localhost  (bzw. ${HTTP_PORT})
# Daten:          ${DATA_DIR}/wiki.db  (Bind-Mount, Backup = Verzeichnis kopieren)
#
# Hinweis better-sqlite3: nativer Build muss zur Ziel-Architektur passen.
# Auf dem Pi nativ (ARM64) bauen, oder `--platform linux/arm64` verwenden.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: wikit-backend:latest
    container_name: wikit-backend
    restart: unless-stopped
    # .env liefert (optionale) OLLAMA_*-Variablen an das Backend.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - WIKI_DB=/data/wiki.db
    volumes:
      # Verzeichnis (nicht Datei) mounten -> wiki.db + WAL-Dateien (-wal/-shm) persistieren.
      - ${DATA_DIR:-./data}:/data
    # Ollama auf dem Host erreichbar machen (OLLAMA_URL=http://host.docker.internal:11434/api/generate).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wikit
    # Standard: NICHT nach außen veröffentlicht — nur via Frontend-Proxy erreichbar.
    # Zum Debuggen direkt freigeben:
    # ports:
    #   - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Branding wird zur Build-Zeit in das Bundle gebacken.
        VITE_WIKI_TITLE: ${VITE_WIKI_TITLE:-Wikit}
    image: wikit-frontend:latest
    container_name: wikit-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - wikit
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  wikit:
    driver: bridge
