# Wikit frontend nginx config.
# Serves the built SPA and reverse-proxies the API to the backend container.
# Mounted to /etc/nginx/conf.d/default.conf inside the nginx:alpine image.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Passend zum 8mb-JSON-Limit im Backend (backend/src/main.ts).
    client_max_body_size 8m;

    # Statische Assets von Vite tragen Content-Hashes -> aggressiv cachen.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + SSE an den Backend-Container weiterreichen.
    # Variable + Docker-DNS-Resolver: übersteht einen Neustart/IP-Wechsel des
    # Backends, ohne dass nginx neu gestartet werden muss.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- Server-Sent Events (KI-Analyse-Stream /api/analysis/stream/:id) ---
        # Ohne diese Zeilen puffert nginx den Stream und der Client bekommt
        # keine Live-Events (@Sse in analysis.controller.ts).
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # SPA-History-Fallback (Vue Router History-Mode): unbekannte Pfade -> index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip für Text-Assets (statische Auslieferung).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
